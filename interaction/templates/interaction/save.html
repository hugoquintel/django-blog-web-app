<form
   method="post"
   action="{% url "interaction:save" blog_id=blog.id %}"
   hx-push-url="false"
   hx-target="this"
   hx-swap="outerHTML show:none"
   hx-trigger="click"
   class="inline-flex cursor-pointer items-center"
>
   {% csrf_token %}
   {% if user in blog.saved_by.all %}
      <i class="fa-solid fa-bookmark"></i>
      <p class="ml-0.5">Saved</p>
   {% else %}
      <i class="fa-regular fa-bookmark"></i>
      <p class="ml-0.5">Save</p>
   {% endif %}
</form>

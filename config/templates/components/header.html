{% load static %}

<div
   class="bg-theme-dark fixed z-1 flex h-14 w-full items-center justify-between px-5 text-lg text-white"
>
   <a
      {% if request.user.is_authenticated %}
         href="{% url "blog:index" partial='None' %}"
      {% else %}
         href="#"
      {% endif %}
      class="hover:text-theme-base cursor-pointer font-light"
   >
      Some logo
   </a>

   {% if request.user.is_authenticated %}
      <div class="font-light">Hello {{ request.user|title }} 👋👋</div>
   {% else %}
      <div class="font-light">Sign in to tell your stories</div>
   {% endif %}

   <div class="flex items-center space-x-3">
      {% if request.user.is_authenticated %}
         <a
            href="{% url "blog:create" partial=None %}"
            class="hover:text-theme-base cursor-pointer"
         >
            <i class="fa-regular fa-pen-to-square"></i>Write
         </a>
         <button class="hover:text-theme-base cursor-pointer">
            <i class="fa-regular fa-bell"></i>
         </button>
         <img
            class="profile-btn hover:text-theme-base h-9 w-9 cursor-pointer rounded-full border-2"
            {% if request.user.picture %}
               src="{{ request.user.picture.url }}"
            {% else %}
               src= {% static "img/stock_pfp.jpg" %}
            {% endif %}
            alt="Profile picture"
         />
      {% endif %}
   </div>
</div>

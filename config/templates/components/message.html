<div
   x-data="{message: $el}"
   class="{% if type == "success" %}
      bg-theme-base
   {% elif type == "error" %}
      bg-red-400 text-off-white
   {% endif %} {{ extra_classes }} flex w-fit rounded-sm p-2 text-lg font-semibold shadow-sm"
>
   <p class="mr-4">{{ message }}</p>
   <span
      @click="message.remove()"
      class="flex cursor-pointer items-center justify-center hover:opacity-50"
   >
      <i class="fa-solid fa-xmark"></i>
   </span>
</div>

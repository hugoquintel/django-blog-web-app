{% load static %}

<a href="{% url "user:profile" user_id=user.id partial=None %}" class="{{ extra_classes }} flex">
   <img
      class="{{ img_size }} border-gray-base rounded-full border"
      {% if user.picture %}
         src="{{ user.picture.url }}"
      {% else %}
         src="{% static "img/stock_pfp.jpg" %}"
      {% endif %}
      alt="{{ user.username }} profile picture"
   />

   <div
      class="{{ font_size|default:"text-sm" }} {{ text_classes }} ml-2 flex flex-col justify-center overflow-hidden break-all"
   >
      <p class="{{ text_element_classes }} line-clamp-1 font-semibold text-black">
         {{ user.username }}
      </p>
      {% if user.get_full_name %}
         <p class="{{ text_element_classes }} text-gray-dark line-clamp-1">
            {{ user.get_full_name }}
         </p>
      {% endif %}
      {% if show_bio %}
         <p class="{{ text_element_classes }} text-gray-dark line-clamp-2">{{ user.bio }}</p>
      {% endif %}
   </div>
</a>

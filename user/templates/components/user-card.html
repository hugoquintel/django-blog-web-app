{% load static %}

<a href="{% url "user:profile" user_id=user.id partial=None %}" class="{{ extra_classes }} flex">
   <img
      class="{{ img_size }} border-gray-base rounded-full border"
      {% if user.picture %}
         src="{{ user.picture.url }}"
      {% else %}
         src="{% static "img/stock_pfp.jpg" %}"
      {% endif %}
      alt="{{ user.username }} profile picture"
   />

   {% if user.get_full_name %}
      <div class="{{ font_size|default:"text-sm" }} {{ text_classes }} ml-2 overflow-hidden">
         <p class="{{ text_element_classes }} line-clamp-1 self-center font-semibold text-black">
            {{ user.username }}
         </p>

         <p class="{{ text_element_classes }} text-gray-dark line-clamp-1">
            {{ user.get_full_name }}
         </p>
      </div>
   {% else %}
      <div class="{{ font_size|default:"text-sm" }} {{ text_classes }} ml-2 flex overflow-hidden">
         <p class="{{ text_element_classes }} line-clamp-1 self-center font-semibold text-black">
            {{ user.username }}
         </p>
      </div>
   {% endif %}
</a>

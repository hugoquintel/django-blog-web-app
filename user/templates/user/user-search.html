{% for user in result %}
   <li class="p-1.5">
      <c-user-card
         :user="user"
         img-size="h-10 w-10"
         extra-classes="rounded-lg p-1 hover:bg-gray-light"
      />
   </li>
   {% if forloop.last and result.has_next %}
      <template
         hx-get="{% url 'user:search' %}?{{ GET_params_str }}&page={{ result.next_page_number }}&snapshot={{ snapshot }}"
         hx-trigger="revealed"
         hx-swap="afterend"
      ></template>
   {% endif %}
{% endfor %}
